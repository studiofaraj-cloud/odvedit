<script type="module">
        import { logout } from './js/auth.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirebaseAuth } from './js/firebase-config.js';
        import { hideElementsWithoutPermission, PERMISSIONS } from './js/rbac.js';
        import { initializeDashboardSidebar } from './js/dashboard-sidebar.js';
        
        const auth = getFirebaseAuth();

        initializeDashboardSidebar();
        
        document.getElementById('logout-btn').addEventListener('click', logout);
        
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await hideElementsWithoutPermission('#admin-users-nav', PERMISSIONS.MANAGE_USERS);
                await hideElementsWithoutPermission('#audit-logs-nav', PERMISSIONS.MANAGE_USERS);
            }
        });
    </script>

    
\n

    <!-- Cookie Consent Scripts -->
    <script src="js/cookie-utils.js"></script>
    <script src="js/cookie-consent.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            try {
                if (typeof CookieUtils !== 'undefined' && typeof UserPreferences !== 'undefined') {
                    window.userPreferences = new UserPreferences();
                }
            } catch (error) {
                console.error('Error initializing cookie systems:', error);
            }
        });
    </script>
