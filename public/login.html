<!DOCTYPE html>

<html lang="en">
<head>
<link href="assets/favicon.ico" rel="icon" type="image/x-icon"/>
<link href="assets/favicon-16x16.png" rel="icon" sizes="16x16" type="image/png"/>
<link href="assets/favicon-32x32.png" rel="icon" sizes="32x32" type="image/png"/>
<link href="assets/apple-touch-icon.png" rel="apple-touch-icon" sizes="180x180"/>
<link href="assets/android-chrome-192x192.png" rel="icon" sizes="192x192" type="image/png"/>
<link href="assets/android-chrome-512x512.png" rel="icon" sizes="512x512" type="image/png"/>
<link href="assets/site.webmanifest" rel="manifest"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title data-i18n="t_424b46b2">Admin Login - ODV</title>
<style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(234, 179, 8, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(234, 179, 8, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
        }

        .login-wrapper {
            width: 100%;
            max-width: 450px;
        }

        /* Improved container organization with better spacing */
        .login-container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.12),
                0 0 0 1px rgba(0, 0, 0, 0.05),
                0 4px 20px rgba(234, 179, 8, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(234, 179, 8, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 25px 70px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(0, 0, 0, 0.05),
                0 6px 25px rgba(234, 179, 8, 0.12);
        }

        /* Enhanced header with better logo placement and spacing */
        .login-header {
            background: #ffffff;
            padding: 50px 30px 30px 30px;
            text-align: center;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* Larger logo sizing - increased to 160px on desktop */
        .logo-container {
            width: 160px;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .logo-container img {
            width: 160px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
        }

        /* Improved admin title styling */
        .admin-title {
            font-size: 1.4em;
            font-weight: 700;
            color: #000000;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .login-subtext {
            font-size: 0.9em;
            color: #718096;
            letter-spacing: 0.02em;
        }

        /* Added yellow accent line for visual organization */
        .header-divider {
            width: 80px;
            height: 4px;
            background: #eab308;
            border-radius: 2px;
            margin: 10px 0 0 0;
        }

        .login-content {
            padding: 40px 30px;
            background: #ffffff;
        }

        .form-group .error-message {
            min-height: 20px;
        }

        /* Form Group Styles */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group:last-of-type {
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 0.9em;
            font-weight: 600;
            color: #000000;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            color: #000000;
            font-family: inherit;
            transition: all 0.3s ease;
            min-height: 44px;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
            background-color: #ffffff;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #eab308;
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.1);
        }

        input[type="email"].error,
        input[type="password"].error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
            background-color: #fef2f2;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: #a0aec0;
        }

        input[type="email"]:valid:not(:placeholder-shown),
        input[type="password"]:valid:not(:placeholder-shown) {
            border-color: #10b981;
            background-color: #f0fdf4;
        }

        /* Button Styles */
        button[type="submit"] {
            width: 100%;
            padding: 14px 24px;
            background: #eab308;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 44px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            -webkit-tap-highlight-color: transparent;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(234, 179, 8, 0.4);
            background: linear-gradient(135deg, #d4a804 0%, #ca8a04 100%);
        }

        button[type="submit"]:active {
            transform: translateY(0);
            box-shadow: 0 4px 15px rgba(234, 179, 8, 0.3);
        }

        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Error Message */
        .error-message {
            color: #ef4444;
            font-size: 0.85em;
            margin-top: 8px;
            display: none;
            font-weight: 500;
        }

        .error-message.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        #login-error {
            margin-top: 20px;
            padding: 16px 20px;
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border: 2px solid #ef4444;
            border-left: 5px solid #ef4444;
            color: #991b1b;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            display: none;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.15);
            position: relative;
            animation: slideDown 0.3s ease-out;
        }

        #login-error.show {
            display: block;
        }

        #login-error::before {
            content: '⚠️';
            margin-right: 10px;
            font-size: 1.2em;
        }

        #login-error[data-error-type="email"]::before {
            content: '📧';
        }

        #login-error[data-error-type="password"]::before {
            content: '🔒';
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Desktop (1025px and above) */
        @media (min-width: 1025px) {
            .login-wrapper {
                max-width: 500px;
            }

            .login-header {
                padding: 60px 40px 35px 40px;
            }

            /* Logo set to 180px on desktop */
            .logo-container {
                width: 180px;
                height: auto;
            }

            .logo-container img {
                width: 180px;
                height: auto;
            }

            .admin-title {
                font-size: 1.6em;
            }

            .login-content {
                padding: 50px 40px;
            }

            input[type="email"],
            input[type="password"],
            button[type="submit"] {
                font-size: 1.05em;
            }
        }

        /* Tablet Portrait (769px - 1024px) */
        @media (min-width: 769px) and (max-width: 1024px) {
            .login-wrapper {
                max-width: 420px;
            }

            .login-header {
                padding: 45px 28px 28px 28px;
            }

            /* Logo 105px on tablet */
            .logo-container {
                width: 105px;
                height: auto;
            }

            .logo-container img {
                width: 105px;
                height: auto;
            }

            .admin-title {
                font-size: 1.3em;
            }

            .login-content {
                padding: 35px 28px;
            }
        }

        /* Mobile Landscape & Large Mobile (481px - 768px) */
        @media (min-width: 481px) and (max-width: 768px) {
            .login-wrapper {
                max-width: 400px;
            }

            .login-header {
                padding: 40px 24px 24px 24px;
                gap: 20px;
            }

            /* Logo 120px on large mobile */
            .logo-container {
                width: 120px;
                height: auto;
            }

            .logo-container img {
                width: 120px;
                height: auto;
            }

            .admin-title {
                font-size: 1.1em;
                margin: 0;
            }

            .login-content {
                padding: 30px 24px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-group:last-of-type {
                margin-bottom: 28px;
            }

            label {
                font-size: 0.85em;
                margin-bottom: 8px;
            }

            input[type="email"],
            input[type="password"] {
                padding: 12px 14px;
                font-size: 0.95em;
            }

            button[type="submit"] {
                padding: 12px 20px;
                font-size: 0.95em;
            }
        }

        /* Small Mobile (up to 480px) */
        @media (max-width: 480px) {
            /* Prevent horizontal scrolling */
            body {
                padding: 16px;
                overflow-x: hidden;
            }
            
            * {
                max-width: 100%;
            }

            .login-wrapper {
                max-width: 100%;
            }

            .login-header {
                padding: 35px 20px 20px 20px;
                gap: 18px;
            }

            /* Logo 100px on mobile */
            .logo-container {
                width: 100px;
                height: auto;
            }

            .logo-container img {
                width: 100px;
                height: auto;
            }

            .admin-title {
                font-size: 1em;
            }

            .login-content {
                padding: 24px 20px;
            }

            .form-group {
                margin-bottom: 18px;
            }

            .form-group:last-of-type {
                margin-bottom: 24px;
            }

            label {
                font-size: 0.9em;
                margin-bottom: 8px;
            }

            /* Touch-friendly form inputs - 16px prevents iOS zoom */
            /* Touch-friendly form inputs - 16px prevents iOS zoom */
            input[type="email"],
            input[type="password"] {
                font-size: 16px !important;
                padding: 14px 16px;
                min-height: 44px;
            }
            
            button[type="submit"] {
                font-size: 16px;
                padding: 14px 24px;
                min-height: 48px;
            }
        }

        /* Very Small Mobile (up to 360px) */
        @media (max-width: 360px) {
            body {
                padding: 12px;
            }

            .login-wrapper {
                max-width: 100%;
            }

            .login-header {
                padding: 30px 16px 16px 16px;
                gap: 15px;
            }

            /* Logo 70px on very small mobile */
            .logo-container {
                width: 70px;
                height: auto;
            }

            .logo-container img {
                width: 70px;
                height: auto;
            }

            .admin-title {
                font-size: 0.9em;
            }

            .login-content {
                padding: 20px 16px;
            }

            label {
                font-size: 0.75em;
            }

            input[type="email"],
            input[type="password"],
            button[type="submit"] {
                font-size: 0.85em;
                padding: 10px 12px;
            }
        }
    </style>
<script src="js/translations.js"></script>

<body>
<div class="login-wrapper">
<div class="login-container">
<!-- Enhanced header with larger logo and decorative divider -->
<div class="login-header">
<div class="logo-container">
<img alt="ODV Logo" src="assets/odvlogo.png"/>
</div>
<div>
<h1 class="admin-title" data-i18n="t_6aff7829">Area Riservata</h1>
<div class="header-divider"></div>
</div>
<p class="login-subtext" data-i18n="t_db8f31a0">Accedi al tuo account</p>
</div>
<div class="login-content" data-i18n="t_c623fe95">
<form id="login-form">
<div class="form-group">
<label for="email">Email</label>
<input autocomplete="email" id="email" name="email" placeholder="your@email.com" required="" type="email"/>
<div class="error-message"></div>
</div>
<div class="form-group">
<label for="password">Password</label>
<input autocomplete="current-password" id="password" name="password" placeholder="”¢”¢”¢”¢”¢”¢”¢”¢" required="" type="password"/>
<div class="error-message"></div>
</div>
<button id="submit-btn" type="submit">Accedi</button>
<div class="error-message" id="login-error"></div>
</form>
</div>
</div>
</div>
<script src="js/firebase-config.js" type="module"></script>
<script src="js/auth.js" type="module"></script>

</body>
</html>
